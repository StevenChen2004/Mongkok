<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurante Mong Kok | Comida China Especial</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="img/logo-icon-tiny.png" type="image/x-icon">
</head>

<body>

  <header>
    <nav>
      <a href="#inicio"><img src="img/mongkok-logo-beta.png" alt="logo-inicio"></a>
      <a href="#inicio">Inicio</a>
      <a href="#menu">Menú</a>
      <a href="#ubicacion">Ubicación</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

  <main id="inicio">
    <section class="hero">
      <div class="slider">
        <div class="slider-container">
          <div class="slide"><img src="img/fake-mongkok.jpg" alt="Interior acogedor del restaurante Mong Kok"></div>
          <div class="slide"><img src="img/comidax.jpg" alt="Plato especial de la casa"></div>
        </div>
      </div>
      <h1>Restaurante Mong Kok: Comida China Especial</h1>
    </section>

    <section id="menu">
      <h2>Nuestra Carta</h2>
      <div class="menu-grid">
        <figure class="dish">
          <img src="img/platos.jpg" alt="Menu Ejecutivo">
          <figcaption>Ejecutivos</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/tacosfritos.jpg" alt="Aperitivo">
          <figcaption>Aperitivos</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/chaomein-juntos.jpg" alt="Chao mein">
          <figcaption>Chao mein</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/arroz.jpg" alt="Arroz">
          <figcaption>Arroz</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/lomito.jpg" alt="Carne de res">
          <figcaption>Carne de res</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/cerdo.jpg" alt="Carne de cerdo">
          <figcaption>Carne de cerdo</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/camaron.jpg" alt="Mariscos">
          <figcaption>Mariscos</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/pollo naranja.jpg" alt="Ave">
          <figcaption>Ave</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/chopsuey.jpg" alt="Chop suey">
          <figcaption>Chop suey</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/bebidas.jpg" alt="Bebidas">
          <figcaption>Bebidas</figcaption>
        </figure>
        <figure class="dish">
          <img src="img/postre.jpg" alt="Postres">
          <figcaption>Postres</figcaption>
        </figure>
      </div>
    </section>

    <section id="ubicacion">
      <h2>Ubicación</h2>
      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3876.217761560156!2d-89.23453219999999!3d13.705256999999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8f6330162df0e163%3A0x43012f87d7ca3c91!2sMong%20Kok!5e0!3m2!1ses-419!2ssv!4v1772752205587!5m2!1ses-419!2ssv"
          width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>

    <section id="contacto">
      <h2>Horario</h2>
      <p>Todos los días abierto de:</p>
      <p><time>11:30</time> am - <time>15:30</time> pm</p>
      <p><time>17:30</time> pm - <time>21:30</time> pm</p>
      <p>Telefono: 2263-3368</p>
    </section>
  </main>

  <footer>
    <div class="social">
      <a href="https://facebook.com" aria-label="Visita nuestro Facebook">
        <img src="img/facebook-logo-icon-free-png.webp" alt="facebook">
      </a>
      <a href="https://instagram.com" aria-label="Síguenos en Instagram">
        <img src="img/instagram.svg" alt="instagram">
      </a>
    </div>
    <p>Todos los derechos reservados</p>
    <p>Copyright &copy; 2026 Restaurante Mong Kok</p>
  </footer>

</html>
